version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: restaurante-backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET}
      - WEBMASTER_JWT_SECRET=${WEBMASTER_JWT_SECRET}
      - WEBMASTER_EMAIL=${WEBMASTER_EMAIL:-admin@miapp.com}
      - WEBMASTER_PASSWORD=${WEBMASTER_PASSWORD}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - FRONTEND_URL=${FRONTEND_URL:-https://*.miapp.com}
      # Multi-tenant data directory — each tenant gets /data/tenants/{slug}/restaurante.db
      - DATA_DIR=/data
      # DodoPayments
      - DODO_WEBHOOK_SECRET=${DODO_WEBHOOK_SECRET}
      - DODO_API_KEY=${DODO_API_KEY}
    volumes:
      # All tenant DBs + master DB live under /data
      - tenant_data:/data
      - backend_logs:/app/logs
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: restaurante-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  # Persistent volume for all SQLite databases:
  #   /data/master.db              — tenants + webmaster_users
  #   /data/tenants/{slug}/        — per-tenant DB + future backups
  tenant_data:
    driver: local
  backend_logs:
    driver: local
